body:
  text: 分𨽻偶存卷下翰林院編修萬經撰古今分𨽻人姓氏秦程邈字元岑下邽人始為衙縣獄吏得罪始皇幽繫雲陽獄中覃思十年益大小篆方圓而為𨽻書三千字奏之始皇善之用為御史用其字以為𨽻人佐書故曰𨽻書唐張懐瓘書斷程君首創𨽻則規範焕于丹青十等中上上品李嗣真書後品王次仲上谷人少有異志年及弱冠變蒼頡舊文為今𨽻書秦始皇時官務繁多以次仲文簡便于事竒而召之三徴不至始皇怒其不恭令檻車送之於道上化為大鳥出在車外翻然而去落一翮于斯山故其峯巒有大翮小翮之名矣酈道元水經注建張懐瓘曰王愔云次仲初中以𨽻草作楷法蕭子良云靈帝時王次仲飾𨽻為八分二家俱言後漢而兩帝不同或云後漢亦冇王次仲為上谷太守非上谷人云陶宗儀曰次仲與程邈同時増廣𨽻書為八分或東漢末人又云有二王次仲皆非也王次仲以楷字法局促遂引而伸之為八字之分故號八分釋適之金壺記上中十三人王次仲正𨽻及八分韋續九品書人論後漢曹喜字仲則扶風平陵人章帝建初中為秘書郎篆𨽻之工收名天下書斷曹喜書如經論道人言不可絶袁昻書評賈魴和帝時人撰滂熹篇以蒼頡為上篇訓纂為中篇滂熹為下篇所謂三倉也皆用𨽻書寫之𨽻法由兹遂廣書斷張昶字文舒伯英季弟為黄門侍郎尤善章草書類伯英時人謂之亞聖極工八分又善𨽻書斷妙品八分九人張昶同上文舒聲劣於兄時云亞聖允為上之中庾肩吾書品中上品七人張昶書後品上中十三人張昶八分及草韋續九品書人論華嶽廟祠堂碑文漢張昶造自書之元帝又刋其二十餘字二書有重名傳於海内水經注蔡邕字伯喈陳留圉人少博學建寧中拜郎中校書東觀遷議郎熹平四年奏求正定六經文字靈帝許之邕乃自書冊一作丹于碑使工鐫刻立于太學門外碑始立觀視及摹寫者車乗日千餘輛填塞街陌初平元年拜左郎將封髙鄉侯著篆勢後漢書本傳熹平四年邕與五官中郎將堂谿典字子度潁川人為西鄂長光禄大夫楊賜字伯獻震之孫宏農華隂人諫議大夫馬日磾字翁叔融之族子議郎張訓字子儁濟隂定陶人韓説字叔儒㑹稽山隂人太史令單颺字武宣山陽湖陸人等正定六經文字同上蔡文姬曰臣父造八分時神授筆法註云邕初入嵩山學書於石室中得素書八角垂芒寫史籀李斯用筆勢誦讀三年遂通其理常居一室不寐恍然一客厥狀甚異授以九勢蔡邕石室神授筆勢邕善篆𨽻採曹喜真定宣父碑文猶傳于世篆者師焉羊欣採能書人名邕書骨氣洞達爽爽如有神力梁武書評神品八分一人蔡邕出世獨立誰敢比肩書斷上中品七人蔡邕蔡公諸體惟有范巨卿碑風華艷麗古今冠絶書後品三經按范巨卿碑魏明帝青龍年任城縣長薛君鄉人翟循等所立中郎已殁於漢獻帝初平三年嗣真謂為邕書謬甚至其藻鑑之不精洪适已譏之矣伯喈三體八分二篆棨㦸彎弧星流電轉纎踰植髮峻極層巘竇臮述書賦上上十九人蔡邕𨽻篆八分韋續九品書人論趙䧕劉宏張文蘇陵傅楨左立孫表史稱蔡邕自書丹使工鐫刻今所存諸經字體各不同雖邕能分善𨽻兼備篆體但文字之多恐非一人可辦史云邕與堂谿典等正定諸經别有趙䧕劉宏張文蘇陵傅楨東觀餘論云石經有一板公羊其末云臣趙䧕議郎臣劉宏郎中臣張文臣蘇陵臣傅楨左立孫表東觀餘論云論語之末題曰詔書與博士臣左立郎中臣孫表數人竊意其間必有同時揮毫者洪适𨽻釋仇子長靈帝時人析里橋郙閣頌建寧五年仇子長書名紼天下碑𨽻師宜官南陽人靈帝好書徴天下工書者於鴻都門至數百人八分稱宜官為最大則一字徑丈小乃方寸千言甚矜其能性嗜酒或時空至酒家書其壁以售之觀者雲集酤者多售則鏟去之後為袁術將鉅鹿耿球碑術所立是宜官書書斷師宜官書如鵬翔未息翩翩自逝梁武書評師宜官鴻都為最能大能小允為上之中庾肩吾書品妙品八分九人師宜官書斷梁鵠字孟皇安定烏氏人以善八分知名舉孝亷為郎靈帝重之亦在鴻都門下遷幽州刺史書斷師宜官每書輒削而焚其柎梁鵠乃益為板而飲之酒候其醉而竊其柎梁卒以書至選部尚書鵠奔劉表魏武帝破荆州募求鵠署軍假司馬在秘書以勤書自効武帝懸著帳中及以釘壁玩之以為勝宜官令宫殿題署多是鵠書衛恒四體書勢鵠法師宜官師善小字梁善大字金壺記梁鵠書如太祖忘寢觀之喪目袁昻古今書評孟皇功盡筆勢字入帳中允為上之下肩吾書品上中品七人梁鵠梁氏石書雅勁于韋蔡書後品妙品八分九人梁鵠書斷上上十九人梁鵠八分韋續九品書人論毛宏字大雅河南武陽人服膺梁鵠研精八分亦成一家法獻帝時為郎中教于秘書書斷毛宏鵠弟子今秘書八分皆傳宏法羊欣採能書人名能品八分三人毛宏書斷左伯字子邑一作邕東萊人特工八分與毛宏等列亦擅名漢末又甚能作紙漢興用紙代簡和帝時蔡倫工為之子邑尤得其妙蕭子良集漢末左子邑小與淳鵠不同然亦有名四體書勢子邑分鑣梁邯允為中之中肩吾書品能品八分三人左伯書斷魏鍾繇字元常潁川長社人也封定陵侯遷太傅諡成侯魏志本傳繇書有三體一曰銘石之書正書最妙者也二曰章程書八分傳秘書教小學者也三曰行押書行書相問者也三法皆世人所善羊欣採能書人名繇同胡昭學書三十年未嘗窺户與子㑹論曰吾精思學書三十年若與人居畫地廣數步卧畫被穿過表每見萬類皆畫象之金壺記鍾繇見蔡邕筆法于韋誕坐中苦求不與搥胸嘔血太祖以五靈丹救之誕死繇盜發其冢遂得之虞喜志林鍾繇書如雲鵠游天羣鴻戲海行間茂宻實亦難過梁武書評鍾天然第一工夫次之妙盡許昌之碑窮極鄴下之牘允為上之上肩吾書品元常正𨽻如郊廟俎豆斯在又比寒澗開豁秋山嵯峨超然逸品書後品妙品八分九人鍾繇太傅雖習曹蔡𨽻法藝過于師青出于藍獨探神妙八分則有魏受禪碑稱此為最也書斷鍾㑹字士季繇少子少敏慧夙成及壯有才數技藝景元三年為征西將軍魏志本傳㑹書有父風稍備筋骨兼美行草尤工𨽻書書斷鍾㑹書有十二種意外竒妙梁武書評士季之範元常猶子敬之禀逸少而工拙兼效真草兼成允上之下肩吾書品上中品七人鍾㑹書後品觀士季之軌轍審鍾家之超越將望古而偕能與象賢而蹈拙如後生之可畏實氣盖乎前哲述書賦上下十三人鍾㑹八分九品論邯鄲淳字子叔潁川人善蒼雅蟲篆許氏字指初平時從三輔客荆州太祖甚敬異之黄初初以淳為博士給事中魏志王粲傳註淳八體悉工師于曹喜尤精古文大篆八分𨽻書自杜林衛宻當作宏以來古文冺絶由淳復著書斷淳以書教諸皇子又建三字石經于漢碑之西其文蔚焕三體復宣較之説文篆𨽻大同而古字小異江式論書表陳留邯鄲淳為魏臨淄侯文學得次仲法名為鵠後羊欣採能書人名邯鄲淳書應規入矩方圓乃成袁昻書評妙品八分九人邯鄲淳書斷韋誕字仲將京兆人建安中拜郎中稍遷侍中中書監以光禄大夫遜位邯鄲淳衛覬及誕並善書有名文章叙録誕師邯鄲淳太和中誕為武都太守以能書留補侍中魏氏寶器銘題皆誕書云四體書勢誕諸書並善尤精題署明帝時凌雲臺初成令誕題榜高下異好宜就加㸃正因致危懼頭鬢皆白既下戒子孫無為大字楷法書斷韋誕書如龍威虎振劍拔弩張梁武書評仲將不妄染墨必須張筆而左紙允為上之下肩吾書品上中品七人韋誕書後品妙品八分九人韋誕書斷魏之仲將奮藻獨步或迸泉湧溢或錯玉班布蹟遺情忘契入神悟然而負才藝履危懼膏明自煎鬢髪改素生非其代痛惜不遇述書賦呉皇象字休明廣陵江都人幼工書時有張子並超陳梁甫能書甫恨逋一作瘦並恨峻象斟酌其間甚得其妙中國善書者不能及也與嚴武棊曹不興畫等謂之八絶云呉志趙達傳註皇象書如歌聲繞梁琴人捨徽袁昻書評休明斟酌二家聨駕八絶允為上之下肩吾書品上中品七人呉皇象書後品妙品八分九人呉皇象書斷呉則廣陵休明樸質古情難以窮真非可學成似龍蠖蟄啓伸蟠復行述書賦上上十九人呉皇象八分九品論皇象書呉大帝碑在江寧府雖本漢𨽻然探竒振古有三代純樸氣羊欣稱象善草書張懐瓘惟稱象小篆入能獨不言象為𨽻字疑此碑近出前人未見董逌廣川書跋蜀漢諸葛亮字孔明琅邪陽都人漢司𨽻校尉諸葛豐後也先主即位策亮為丞相建興元年封武鄉侯諡忠武蜀志本傳先主嘗作三鼎皆孔明篆𨽻八分書極工妙周越古今法書苑張飛字翼徳涿郡人章武元年遷車騎將軍領司𨽻校尉封西鄉侯諡曰桓蜀志本傳涪陵有張飛刁斗銘其文字甚工飛所書也張士環詩云人間刁斗見銀鈎楊慎丹鉛總録飛不獨有八分書刁斗銘又有流江縣紀功題名云漢將軍飛率精卒萬人大破賊首張鴿于八濛立馬勒銘陳繼儒太平清話晉索靖字幼安燉煌人也為始平内史加散騎常侍遷後將軍贈司空進封安樂亭侯諡曰莊晉書本傳靖張伯英之娣孫善章草書出于韋誕峻險過之又善八分韋鍾之亞毋邱興碑是其遺蹟也書斷索靖書如飄風忽舉鷙鳥乍飛梁武書評幼安歛蔓舅氏抗名衛令允為上之下肩吾書品上中品七人索靖索有月儀三章觀其趣况大為遒竦無愧珪璋特達猶夫聶政相如千載凜凜為不亡矣又毌邱興碑云是索書比蔡石經無相假借書後品妙品八分九人索靖書斷陳暢滎陽人晉秘書令史善八分晉宫觀城門皆暢書也羊欣採能書人名王洽字敬和導諸子中最知名歴官至呉郡内史徴拜中書令苦讓不受晉書本傳王洽衆書通善尤能𨽻行從兄羲之云弟書遂不減吾羊欣採能書人名王洽並通諸法允為中之下肩吾書品變古制今惟右軍領軍不爾至今猶法鍾張王僧䖍論書上下品十二人王洽體裁用筆全似逸少虛薄不倫右軍藻鑒豈當虛發葢欲假其名譽耳楷之中下豈所謂允僉望哉書後品上下十三人晉王洽八分𨽻及篆九品論王羲之字逸少司徒導之從子也善𨽻書為古今之冠為右軍將軍㑹稽内史卒贈金紫光禄大夫晉書本傳羲之善草𨽻八分飛白章行備精諸體自成一家之法千變萬化得之神功王羲之别傳逸少見諸家筆論遂作筆陣圖及筆勢論金壺記晉成帝時祀北郊更祀版工人削之羲之筆入木三分筆勢傳王羲之書字勢雄逸如龍跳天門虎卧鳯閣故歴代寶之永以為訓梁武書評王右軍書如謝家子弟縱復不端自奕奕有一種風氣袁昻書評若探妙測深盡形得勢烟華落紙將動風彩帶字欲飛疑神化之所為非人世之所學惟張有道芝鍾元常王右軍其人也張工夫第一天然次之鍾天然第一工夫次之王工夫不及張天然過之天然不及鍾工夫過之羊欣云貴越羣品古今莫二兼撮衆法備成一家若孔門以書三子入室矣允為上之上肩吾書品逸品四人王羲之書後品妙品八分九人王羲之書斷荆山之下玉石參差或價賤同于瓦礫或價貴重于連城其八分即二王之石也張懐書議王獻之字子敬羲之第七子工草𨽻七八嵗時學書羲之從後掣其筆不得歎曰此兒後當復有大名尋除建威將軍呉興太守徴拜中書令贈侍中特進光禄大夫諡曰憲晉書本傳二王鍾變行𨽻及藁體為八體書墨藪王獻之書絶衆超羣無人可擬如河朔少年皆悉充悦舉止沓拖而不可耐梁武書評子敬泥箒最騐天骨兼以掣筆復識人工一字不遺兩葉傳妙允為上之中肩吾書品逸品四人王獻之書後品能品八分三人王獻之書斷劉瓌之字元寶