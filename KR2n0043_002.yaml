令兼尚書令歐陽公集王洙曰先公初不習𨽻書但微作八分皇祐初受詔書獻穆公主碑李氏求以古𨽻寫于是始作𨽻書既出人競愛宋丞相曰近世人家桓楹之刻所未及也君謨亦曰君𨽻字乃得漢世舊法僕所作但唐𨽻耳公受詔與君謨分寫邇英閣二圖公書無逸篇君謨真字書孝經既成上作飛白二軸答之後又受詔分寫集禧觀諸殿榜公書奉福虚福殿二榜君謨神藻殿二榜公亦習古文小篆今上景祐徽號玉冊宣獻宋公受詔寫宋公不習篆公代書也公所書石𨽻字則獻穆大長公主碑曹襄悼碑范文正碑宴元獻碑伊先生隔山庵記正字則張少監墓志濠州四望亭詩莊生臺詩宋宣獻詩書額濠州四望亭南京御史臺讀易堂襄州峴山亭臨芳亭華嵓寺羊太傅廟􅒾京教忠積慶寺東都李氏閒燕堂來驚堂連亭箖箊亭劉氏蕓華堂王氏談錄王洙字原叔應天宋城人中甲科累擢翰林學士以兄子堯臣參知政事改侍讀學士兼侍講學士泛覽博記至圖緯方技隂陽五行算數音律訓詁篆𨽻之學無所不通諡曰文宋史本傳王洙晚喜𨽻書尤得古法當時學者翕然宗尚而𨽻法復興墨池編能品六十六人王洙續書斷趙克繼秦王廷美之曽孫善楷書尤工篆𨽻宗正薦之仁宗親臨試及令臨蔡邕古文法寫論語詩書復詔與朝士分𨽻石經帝曰李陽冰唐室之秀今克繼朕之陽冰也訓子弟力學一門登儒科者十有二人嘗進所集廣韵字源帝稱善藏之秘閣元祐六年以定武軍節度觀察留後贈建國公諡章靖宗史本傳蔡襄字君謨興化仙遊人舉進士為西京留守推官慶歴三年知諌院英宗時拜端明殿學士知杭州贈吏部侍郎襄工於書為當時第一仁宗尤愛之製元舅隴西王碑文命書之及令書温成后父碑則曰此待詔職耳不奉詔乾道中賜諡忠惠宋史本傳妙品十六人蔡君謨續書斷君謨真行草𨽻無不如意其遺力餘意變為飛白可愛而不可學近嵗書以君謨為第一而論者或不然殆未易與不知者言也東坡集君謨行書最勝小楷次之草書又次之大字又次之分𨽻少劣東坡評書劉敞字原父臨江新喻人舉慶歴進士廷試第一擢知制誥拜翰林院學士侍英宗講讀改集賢院學士學問淵博嘗得先秦彛鼎銘識竒奥皆按而讀之因以攷知三代制度宋史本傳劉原父弡仲􅔆銘以𨽻寫之東觀餘論呉中復神宗時人百花潭口舊有任氏一碑乃宋熈寧間呉中復撰八分書何字度益部談資司馬光字君實陜州夏縣人仁宗寶元初中進士甲科為通志八卷英宗悦之命置局秘閣續其書神宗名之曰資治通鑑元祐元年拜尚書左僕射兼門下侍郎贈温國公諡文正宋史本傳温公𨽻法精勁似其為人所謂左凖繩右規矩聲為律身為度者觀其書可想見其風采山谷集南屏山興教寺磨崖家人卦中庸大學篇司馬温公書錢唐自五季以來無干戈之禍其民富麗多滛靡之尚於齊家之道或闕焉故司馬公書此以助風教非偶然也葉紹翁四朝聞見錄米芾字元章呉人以母侍宣仁后藩邸舊恩補浛光尉歴知雍丘縣漣水軍太常博士知無為軍召為書畫學博士曽對便殿上其子友仁所作楚山清曉圖擢禮部員外郎出知淮陽軍妙於翰墨沈著飛翥得王獻之筆意尤工臨摹至亂真不可辨嘗奉詔倣黄庭小楷作周興嗣千文韵語又入宣和殿觀禁内所藏人以為寵宋史本傳米芾書學羲之篆宗史籀𨽻法師宜官晚年出入規矩自謂善書者只有一面我獨有四面寸紙數字人爭售之以為珍玩請求碑榜户外之屨常滿家藏古帖甚富名其所藏寶晉齋宣和書譜于琮毘陵人善𨽻書學魏受禪表深得其行筆意任誼字才仲洛陽人官澧州通判小字𨽻書古勁學中郎書經杜仲微作𨽻書用秃筆自謂得漢𨽻遺法書史會要翟耆年字伯夀好古博文撰籀史二卷奉梁無錫志耆年工篆及八分書史㑹要徐藏字子禮甌寧人由進士知饒州後改浙吏提舉常平知秀州藏有書學尤擅漢𨽻姑蘇志向子廓浚儀人周敦頤拙賦向子廓𨽻書趙師俠刻於郡丞㕔後古今碑帖考洪适字景伯鄱陽人紹興十三年中博學鴻詞科乾道元年拜尚書右僕射同中書門下平章事諡文惠宋史本傳洪适取古今石刻法其字為之韵辨其文為之釋以辨𨽻書曰𨽻釋𨽻續中興藝文志虞似良字仲房號横溪自號寶蓮上人官至監左藏東庫善篆𨽻家藏漢刻數千本心摹手追盡得㫖趣大至數尺小至蠅頭各臻其妙兼能古文竒字謝翺金華游錄似良詩詞清婉得唐人㫖趣尤工𨽻書無一食頃去筆札至寤寐猶運指作勢衾裯當指處皆裂有篆𨽻韵書行于世台州志虞兵部仲房書杜工部李潮八分小篆王宰山水圖兩篇𨽻法壊自公始然亦自成一家摶搦騫騰鯨鵬撮摩夭矯容與烟雲卷舒數十年豐功厚德之所載識借公為重不專在翰墨也不知公者獨以𨽻古稱豈知公哉釋居簡北閒文集方士繇字伯謩一名伯體莆陽人朱公元晦倡道學於建安往從之以傳道為後學師工于書自篆籀分𨽻行草諸體皆極其妙渭南集朱子答蔡季通書云篆𨽻碑于字畫皆不滿人意未有可寫之人令伯謩篆如何朱子續集吕勝已字季克邵武人與張栻朱熹講學工𨽻書得漢法仕為湖南幹官歴倅江州知杭州自號渭川居士八閩通志黄銖字子厚崇安人少師事劉子翬與朱子為同門友為文畧相上下𨽻法甚古得魏晉以前筆意八閩通志朱協極與朱子同時宋敬齋箴朱熹撰朱協極𨽻天下金石志婁機字彦發嘉興人乾道二年進士為太常博士秘書郎皇太子始就外傅以機兼資善堂小學教授以累朝事親脩身治國愛民四事手書以獻太子寘之座右朝夕觀省太子得機所著廣干禄一編尤喜命戴溪跋之擢監察御史遷禮部尚書同知樞宻院事參知政事嘉定二年以資政殿學士知福州機深於書學尺牘人多藏弆焉宋史本傳漢𨽻字源檇李婁君彦發所輯也合蔡中郎諸人筆力通神之妙皆聚此篇洪邁漢𨽻字源序魏了翁字華甫卭州蒲江人慶元五年登進士第嘉熙中資政殿大學士諡文靖贈秦國公宋史本傳鶴山先生善篆不規規於繩尺中而有自然之勢嘗以篆法寓諸𨽻最為近古書史㑹要龔開字聖與號翠巖淮隂人宋兩淮制置司監官博聞耿介作古𨽻得漢𨽻筆意書史㑹要單夔官至侍從倣唐八分方勁有體師豫章書史㑹要李伉未詳何時人鄆州州學新田記碑李伉𨽻書題額下欵俱如漢刻有古受禪碑遺意元牘記内臣楊日言字詢宜開封人喜經史工篆𨽻八分書書史㑹要釋省欽善八分書太宗詔於殿上書數行得賜紫衣小畜集釋嗣端真宗時人宋藍田縣修夫子廟碑進士董儲記僧嗣端書分𨽻深得唐人法大中祥符四年立石墨鐫華楚珍彭澤娼女草篆八分皆工書史㑹要蘓氏建寧人淳祐間流落樂籍以蘓翠名能八分書書史㑹要金黨懐英字世傑馮翊人大定十年中進士第能屬文工篆籀當時稱為第一學者宗之為翰林學士承㫖致仕諡文獻金史本傳黨懐英篆籀入神李陽冰之後一人而已嘗謂唐人韓蔡不通字學八分自篆籀中來故懐英書上軋鍾蔡其下不論也小楷如虞褚亦當為中朝第一書法以魯公為正栁誠懸以下不論也趙秉文滏水集麻九疇字知幾易州人七嵗能草書作大字有作數尺者一時目為神童章宗召見竒之入大學有文名已而隠居不為科舉計趙秉文薦之特賜盧亞榜進士第俄遷應奉翰林文字金史本傳九疇字畫正書八分皆有功中州集張本字敏之觀津人貞祐元年中詞賦髙第工大篆八分正大九年以翰林學士見留遂隠為黄冠居燕京長春宫泔水仙澤謠元趙孟頫字子昻宋太祖子秦王德芳之後也四世祖伯圭賜第湖州為湖州人幼聰明讀書過目輒成誦為文操筆立就至元中摉訪遺逸授兵部郎中遷集賢直學士延祐三年拜翰林學士承㫖榮禄大夫嘗與侍臣論文學之士以孟頫比唐李白宋子瞻封魏國公諡文敏孟頫篆籀分𨽻真行草書無不冠絶古今遂以書名天下天竺有僧數萬里來求其書歸國中寶之元史本傳公性善書專以古人為法篆則法石鼓詛楚𨽻則法梁鵠鍾繇行草則法逸少獻之不雜以近體楊載翰林學士趙公狀熊朋來字與可豫章人薦為閩海提舉儒學官而朝廷以東南儒學之士惟福建廬陵為最盛時起朋來連為兩郡教授所至考古篆籀文字晚以福清州判官致仕學者稱為天慵先生元史本傳往者鶴山魏公嘗以篆法寓諸𨽻體最為近古近時豫章熊先生亦用之道園學右錄吾丘衍字子行太末人家於錢塘嗜古學通經史百家言工于篆籀其精妙不在秦唐二李下性放曠不事檢東𦕈左目左足跛而風度特醖藉每以郭忠恕自比自號貞白處士所著有周秦刻石音釋學古編篆籀之學至宋季其敝極矣子行始倡其説以復于古而呉興趙文敏公實和之其學乃大後得其傳以名世者宛邱趙子竒濮陽呉孟思王禕思文公集周嶷蘄黄人博識古文于篆籀尤癖嗜逺近碑刻藉手以為寶重然有求書者或非聖賢理道雖百計懇率不與儒者以是多之故所行世亦絶少續宏簡錄虞集字伯生宋丞相允文五世孫從呉澄游授受具有源委大德初以薦授大都路教授文宗在潛邸已知集名既即位除奎章閣侍書學士贈江西行中書省參知政事䕶軍封仁夀郡公闢書舍為二室左室書陶淵明詩于壁題曰陶庵右室書邵堯夫詩題曰邵庵故世稱邵庵先生元史本傳虞集真行草篆皆有法度𨽻為當代第一書史㑹要陸友字友仁博雅好古工漢𨽻八分書尤能鑒辨三代漢魏而下鐘鼎銘刻晉唐法書名畫皆有精識嘗至都下虞奎章柯博士皆善其書言于上未及任用而歸張昶呉中人物志友仁追跡石經欲與蔡鍾相上下嘗書八分小篆歌如昆刀切玉不見形迹而剛强之氣温潤之質望之儼然墨史楊益洛陽人歴行臺御史轉員外郎出撫南雍學古錄虞集贈詩云洛陽楊友直字擬漢中郎同上楊益古𨽻學廬江太守碑亦能篆書史㑹要張恕字如心浦江人舉明經歴任武陵東陽慶元學正素與呉萊栁貫友善書體壯勁得八分之正張應槐浦陽人物續記杜本字伯原清江人博學善屬文隠武夷山中文宗徴之不起右丞相脱脱以隠士薦召為翰林待制至杭州稱疾不行工于篆𨽻學者稱為清碧先生元史本傳杜本工楷𨽻楷書結體謹嚴全具八分𨽻書學漢陽馥碑書史㑹要魏敬益字士友洛陽人臨江總管古𨽻學廬江太守亦能篆書史㑹要石巖字民瞻京口人官至縣尹𨽻書法韓尚書書史㑹要鄭枃字子經羅源人泰定中辟南安儒學教諭與陳旅為文字友著衍極五篇衍極記載三篇其書自蒼頡迄䝉古凡古人篆籀以及書法之變皆在所論宣撫使齊伯亨采而上之作衍極堂以藏其書何喬逺閩書鄭枃能大字兼八分書史㑹要李佚其名字申伯江右人官至集賢待制古𨽻專學孫叔敖碑得古勁古拙之法書史㑹要王務道字宏本山隂人呉志淳字主一曹南人古𨽻俱學孫叔敖碑書史㑹要繆貞字仲素常熟人善篆𨽻真行書好古博識隠居不仕八分小篆追蹤張有正書尤髙古致道觀虞山福地四篆字碑烈士碑𨽻書其蹟也旁有正書題識尤佳所著有書學明辨鄧黻常熟志舒頔字道源績溪人至元丁丑辟池陽教諭至正庚寅轉台州學政為詩蒼古不貴纎巧習字尤喜樸拙識者曰宗漢𨽻非八法也名其齋曰貞素學者稱曰貞素先生明人列朝詩集舒頔自作貞素先生𫝊云風清晝閒或篆𨽻數章意與筆悟則快然自得雖不逮斯繇然時人亦莫予解貞素齋集楊元正吉水人翰林檢討善行草其𨽻法師蔡邕為時所重續宏簡錄李介石字守道以書見省臣命草符􅊾遂器重之授松江府提控案牘後守鎮江王逄有寄李守道詩云西湖有竒士少負不羈才酒外嗜八分席地畫青苔梧溪集楊翮字文舉金陵人元末提舉江浙學校楊孟載悼楊文舉詩云八分書古追東漢七字詩工到盛唐眉庵集汪正字大雅四明人工八分書書史㑹要李林字九皋錢塘人古𨽻學受禪表書史㑹要周伯琦字伯温饒州人以䕃授南海主簿三轉為翰林修撰帝以伯琦工書法命篆宣文閣寶仍題匾宣文及摹王羲之蘭亭序智永所書千字文刻石閣中招諭平江張士誠拜江浙行省左丞留平江者十餘年伯琦博學工文章而尤以篆𨽻真草擅當時嘗著六書正訛説文字原二書元史本傳伯琦篆師徐鋐張有正行筆結字殊有𨽻體正書亦佳書史㑹要蘇大年字昌齡號西坡真定人居揚州工八分行書書畫史明張羽字來儀潯陽人好著述文詞典雅紀載行事詳而有體洪武初以儒徴對不稱㫖放還又徴起為太常丞名山藏張羽𨽻法韓擇木弇州山人稿邵誼字思宜休寧人洪武初以文學舉授本縣訓導調㸃縣善篆𨽻詹希原朱同咸推重其字學萬姓統譜思宜分書學受禪碑亦雅勁詹氏小辨王廉字希陽麗水人洪武初薦入翰林修史書成授太子説書累官至陜西左布政字宗韓擇木兼精篆𨽻何鏜括蒼志顧禄字謹宗華亭人能詩善書行楷學蘇文忠尤工于分𨽻洪武中為太常典簿華亭志曽鼎字元友更字有實泰和人有孝行人稱曰曽孝子元末為濓溪書院學正洪武三年以明經舉引疾辭博學强記工詩擅八分書範金為小印章渾然古意楊士竒東里集李汶字宗茂博學多才善漢𨽻國初召為史館編修與修元史授巴東南和令晚年歸隠鄉里扁其所居曰兼山艮所號石泉翁嘗集蔡邕書成四言古詩以訓其子寧門人張中謂其結體遒勁筆勢飛動若長鎗大劍交馳其壯且武也若商彛周鼎之銘其文甚古也李蕙太平府志鄭煜字宗晦枃子洪武中辟興化縣訓導天才逸出長于八分書閩書宋季子以字行家于臨川為詩文有法且留意于𨽻古之學所獲漢魏諸碑刻必夙夜潛玩三走鄱陽見伯誠先生歐君復悉以作𨽻之法授焉復從龍虎山中質諸方壺翁從義翁于是學大進遂以善𨽻書知名宋濓重校漢𨽻字源序謝章大祖時人詹同謝章𨽻書歌云君不見天雨粟泣魑魅蒼頡制字洩天秘科斗之文久茫然史籀秦斯兩相繼大小二篆生八分此後六書從簡易邕邈𨽻字近古淳羲旭行草紛如雲謝章讀書𨽻更好使我見之過所聞不求妍巧自竒拙禹鼎周彛文斷缺連昌宫中墜井釵赤壁江底沈沙鐵魚魚雅雅錐畫深一字豈但值百金冠冕佩玉古君子天生古貌多古心春蚓秋蛇世交錯嗟我毫端久荒落墨池風暖白日長正欲相從謝章學天衢舒嘯集沈度字民則華亭人少力學善篆𨽻真行八分書洪武中舉文學不就成祖擢為翰林典籍一時翰林善書如解大紳之真行草胡光大之行草滕用亨之篆八分王汝玉梁用行之真楊文遇之行皆知名當世而胡解及度之書獨為上所愛凡玉冊金簡用之宗廟朝廷藏秘府施四裔刻之貞石傳于後世一切大制作必命度書書婉麗飄逸雍容矩度八分尤為髙古渾然漢意累官翰林學士東里集滕用亨字用衡蘇州人問學辨博文詞爾雅尤精六書之學篆法之妙髙出近世永樂三年被薦召試篆書作麟鳯龜龍四大字又獻禎符三詩稱㫖授翰林待詔延休堂漫錄用衡所獻禎符之詩三篇手寫副本而正書篆𨽻皆具葢用衡以能書薦起篆𨽻尤其所長時未授職故欲以此自見也匏翁家藏集程南雲南城人永樂初以能書徴授中書舍人精篆𨽻為時所尚正統中為南京太常卿列卿記南雲篆法得陳思孝之傳𨽻真草俱有古則又善大字書史㑹要張端將樂人少有才名景泰間以薦授鑄印局使直南薰殿善楷草書尤工篆𨽻丘瓊山嘗作考𨽻辨以遺之延平志林宗道字仲學景泰間領鄉薦為文詞氣豪逸尤善𨽻書晚年用筆益蒼勁閩書左贊字時翊南城人學書于程南雲以詞翰名于時天順丁丑登進士第擢吏部主事成化中為廣東右布政何喬新椒丘文集左贊書法兼諸體而尤精于𨽻得二蔡筆意書史㑹要李東陽字賓之茶陵人四嵗能大書景帝召見加諸膝賜寶鏹舉天順八年進士授編修宏治八年入内閣十六年加太子太保户部尚書謹身殿大學士贈太師諡文正吾學編涯翁篆勝古𨽻古𨽻勝真行草弇州山人集李應楨名甡以字行更字貞伯長洲人景泰癸酉舉鄉試入太學授中書舍人宏治中為太僕少卿博學好古篆楷俱入格列卿記文徴明曰家君寺丞在太僕時公為少卿徴明以同僚子弟得朝夕給事左右所承緒論為多一日書魏府君碑顧謂徴明曰吾學書四十年今始有得然老無益矣子其及目力壯時為之因極論書之要訣累數百言凡運指凝思吮毫濡墨與字之起落轉換大小向背長短疎密髙下疾徐莫不有法葢公雖潛心古法而所自得為多當為國朝第一其尤妙能三指尖搦管虛腕疾書今人莫能及也甫田集少卿真行草𨽻皆清潤端方如其為人書史㑹要文徴明名璧以字行更字徴仲長洲人以貢至京師授翰林待詔少拙于書刻意臨學亦規模宋元既悟筆意遂悉棄去專法晉唐其小楷雖自黄庭樂毅中來而温純精絶虞褚而下弗論也𨽻書法鍾繇獨步一世生平雅慕趙文敏每事多師之論者謂詩文書畫雖與趙同而出處純正若或過之文嘉行畧公于書未嘗苟且或答人簡札少不當意必再三易之不厭故愈老而愈益精細有細入毫髪者或勸其草應酬曰吾以此自娯非為人也李文正以篆自負及見公𨽻曰吾之篆文生之𨽻蔑以加矣黄佐衡山文公墓志銘徴仲嘗自負𨽻法則不尚古人而歉于篆然余得其千文一本亦在呉興堂廡也藝苑巵言文彭字夀承號三橋待詔徴明子也少承家學善真行草書尤工草𨽻咄咄逼其父以諸生久次貢授秀水訓導擢國子助教于南京王世貞呉中往哲像贊文彭篆分真行草並佳體體有法並自成家不蹈父迹才似勝之工力逺不及父詹氏小辨髙瀔字宗吕侯官人早嵗善屬詞不樂舉子業孤潔一世知名海内善𨽻草八分名藏徐蘭字芳逺號南塘其先餘姚人後徙髙郵為郡諸生累舉不第遂潛心書法正書師鍾繇宣示表草師王獻之授衣天寶節過鵝還等帖皆淳古遒勁度越流俗尤精六書考究㸃畫正其訛謬作古文竒字得邉魯生筆法八分初法蔡邕淳于長碑不失矩度而晚年參以己意時人謂其書與程南雲並馳逺近求者無虛日蘭亦髙自矜貴間有挾勢位使輿𨽻致之輒白眼叱去曰吾豈秪役者耶人以是益重之張時徹寧波府志徐蘭與豐坊同時好作𨽻字不師漢人而師宋廬陵朱協極蘇學嘗有協極所書敬齋箴石刻字畫無法俗惡可厭後之人乃有好之如徐氏者亦其所遭然也金薤琳瑯陸師道字子傳號五湖長洲人嘉靖戊戌進士授都水主事改儀部入直内閣以母老乞歸起為尚寶司少卿師事待詔刻意為文章及書畫皆入能品姑蘇名賢小記師道工小楷及古𨽻馮允成集周紹元字希安華亭人思兼子隠居藻里工八分精篆刻松江志周天球字公瑕號幼海長洲人少遊文待詔門下習為書法待詔極許可之曰他日得吾筆者周生也及籍諸生不喜治帖括獨好古文詞日夜切劘久之其業乃成書法亦日有名為呉人所宗于慎行榖城山房集公瑕治大小篆古𨽻行楷皆模範文太史晚能自得蹊徑一時豐碑大碣無不出其手馮元成集王穉登字百穀先世江隂人移居呉門十嵗為詩長而駿發名滿呉㑹間妙于書及篆𨽻呉門自文待詔殁後風雅之道未有所歸百穀振華啓秀嘘枯吹生擅詞翰之席者三十餘年閩粤之人過呉門者雖賈胡窮子必蹖門求一見求其片縑尺素然後去列朝詩集王百穀𨽻書遒古大勝真草游居錄孫得源字本卿楷宗顔平原八分法鍾太傅小篆倣李丞相詩句出入陶謝元白諸家操行甚卓縉紳雅重之何三畏潄六齋全集孫克宏字允執號雪居文簡公承恩子以父任為應天治中擢漢陽知府正書倣宋仲温八分宗秦漢松江志俞允文字仲蔚崑山人少工臨池久而益擅之其小𨽻駸駸歐栁而上登呉興堂行書出入褚河南稍縦之則米襄陽八分自謂得西嶽碑體以方韓蔡蔑如矣弇州續藁呉錦字有中休寧人受筆法于許元復書各體俱能分書入妙幾過文待詔號六松山人詹氏小辨王樗全初名鼎字康生太倉人書法健利有致晚得鍾太傅受禪碑習之至忘寢食以故于八分尤精弇州山人藁梁桂茂善八分書官臨安知府江寧府志江徽字仲徽婺源人詩極壯麗工八分書性傲岸時以方盧次梗云徽州志陳夀徴以字行莆田人工數體書尤善八分閩書章國舜字伯元號秀南新昌人隆慶改元貢入太學選得閩之政和令書法喜顔蘇工漢𨽻獨不好為草書馮伯謹虚舟李開芳字伯東别號還素閩永春人萬歴中成進士授主事累遷南太僕卿臨池之技縱横跌蕩不減素師葉向髙蒼霞餘草開芳好以篆𨽻八分作署書自謂得斯邈遺意體勢雖涉竒怪袤丈之字畧無怯澀亦人所難書史㑹要胡宗仁字彭舉上元人隠于冶城山下生而偉壯美髯晚年衲衣拄杖义手徐步鬚髯從風飄颺市人皆目為神仙列朝詩集宗仁擅漢𨽻得中郎遺法五雜俎彭舉師魏受禪碑簡勁方正中雅氣逼人江寧府志郭天中字聖僕先世莆田人其祖以避冦徙秣陵不事生業專精篆𨽻之學窮崖斷碑搜訪模搨寢食俱廢晚年𨽻書益進師法秦漢最為逼古列朝詩集歐陽序字惟禮江寧人能詩詞工篆籀仕福州府幕官罷歸結茅於姑塘之麓終老焉江寧府志惟禮真師率更篆八分師二季與梁鵠結搆不疎古雅有意金陵瑣事宋珏字比玉莆田人善八分書規模夏承碑蒼老雄健骨法嶄然列朝詩集沈宏嘉字叔雅嘉興人工篆𨽻八分董氏戯鴻堂帖其手摹勒石也珊瑚網鄺露字淑雅南海諸生工大小篆八分行草書詩曰嶠野集手書開雕極精楷廣東通志馬如玉字楚嶼本張姓家金陵南市樓徙居舊院熟精文選唐詩善小楷及八分書分𨽻偶存卷下
