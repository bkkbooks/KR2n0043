body:
  text: 分𨽻偶存卷上翰林院編修萬經撰作書法一生筆純毫為心軟而復健二生紙新出篋笥滑潤易書即受其墨若久露風日枯燥難用三生硯用則貯水畢則乾之司馬云硯石不可浸潤四生水義在新汲不可久停停不堪用五生墨隨要旋研凌利墨光為上研多則泥鈍也六生手適携執勞腕則無凖七生神凝神靜思不可煩躁八生目寢息適寤光朗分明九生景天氣清朗人心舒恱乃可言書也唐李陽冰翰林禁經九生法筆要取崇山絶仭中兔毛八九月收之其筆頭長一寸管長五寸鋒齊腰強者其硯取煎涸新石潤澀相兼浮津耀墨者其墨取廬山之松煙代郡之鹿膠十年以上強如石者為之紙取東陽魚卵虛柔滑淨者晉衛夫人筆陳圖筆字一寸蹲七釐提五釐畫一分以是為率清徑遞減三釐初學提活蹲輕則肉圓老成提緊蹲重則肉䟐􅂒如萬嵗枯藤䟐􅂒也季海筆在畫中力出字外用此也紙強弱有分筆力臨時斟酌之水太漬則肉散太燥則肉枯乾研墨則濕點筆濕研墨則乾點筆墨太濃則肉滯太淡則肉薄粗則多纍積則不勻磨墨之法重按輕推逺行近折硯池寬面細每夕一洗則水墨調勻血肉得所端石惟取細潤停水歙石惟取縝澀發墨兼之斯為寶矣凡磨墨不得用硯池水令墨滯筆沍須以水滴汲新水臨時斟酌之凡書不得自磨墨令手顫筋骨木強是大忌也初學須用佳紙令後不怯須用惡筆令後不擇筆元陳繹曽翰林要訣古人晨起必濃磨墨汁滿硯池以供一日之用用不盡則棄去來早再作故硯池必大而深真草篆隸皆用濃墨至行草過筆處雖如絲髮其墨亦濃宋趙希鵠論用墨夫欲書者先研乾墨凝神靜思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字晉王羲之題筆陳圖後書者散也欲書先散懷抱任情恣性然後書之若迫於事雖中山兔毫不能佳也夫書先默坐靜思隨意所適言不出口氣不盈息沉密神彩如對至尊則無不善矣後漢蔡雍筆論夫欲書之時當收視反聽絶慮凝神心正氣和則契於元妙心神不正字則欹斜志氣不和書必顛覆其道同魯廟之器虛則欹滿則覆中則正正者沖和之謂也大抵腕豎則鋒正鋒正則四面勢全次實指指實則筋力均平次虛掌掌虛則運用便易唐太宗筆法訣第一執筆法擫擫大指骨上節下端用力欲直如提千鈞捺捺食指著中節旁此上二指主力鈎鈎中指著指尖鈎筆令向下揭揭名指著指外爪肉際揭筆令向上抵名指揭筆中指抵住拒中指鈎筆名指拒定此上二指主轉運導小指引名指過右送小指送名指過左此上二指主來往右名撥鐙法撥者筆管著中指名指尖圓活易轉動也鐙即馬鐙筆管直則虎口開如馬鐙也足踏馬鐙淺則易出入手執筆管淺則易轉動也第二血法蹲七分三折管直心圓駐七分力到水聚提三分大指下節骨竦水下捺九分力滿過十分疾過搶各有分數圎蹲直搶偏蹲倒搶出鋒空搶衄三分三搖筆殺力字生於墨墨生於水水者字之血也筆尖受水一點已枯矣水墨皆藏於副毫之內蹲之則水下駐之則水聚提之則水皆入紙矣捺以勻之搶以殺之補之衄以圓之過貴乎疾如飛鳥驚蛇力到自然不可少凝滯仍不得重改按前第四條蹲提捺即此意陳繹曽翰林要訣凡執管須識淺去紙淺深去紙深長筆頭長以去紙深也短筆頭短以去紙淺也真書之管其長不過四寸有竒須以三寸居於指掌之上只留一寸一二分著紙蓋去紙逺則浮泛虛薄去紙近則揾鋒是好處勢重若中品書把筆略起大書更起草訣云須執管去紙三寸一分當明字之大小為淺深也執管之法須置管於大指中節之前不得當節以得其運動須要居於動靜之際書法所云招大指者大約當以筆在指端運動適意則騰躍頓挫生意出焉若當節則掌如握樞每每不得自由轉動必礙凡回旋處多成稜角筆死矣安望字之生動乎略略以食指實其中指兼助為力指自然實世俗多以單指苞之單鈎則肘臂著紙力不足而無神氣便有拘局而不放浪的意自必以雙指苞管蓋撮中指而斂食指以助之者也雖云要齊又不必十分牽之使齊亦要有自在意思方得正所謂雙苞而實指者夫雙苞則堅堅則掣打徑利齊指則實實則筋力均平又有名指拒前三指所執之管更以小指拒前名指雖用大中食三指著力亦須五指共執令掌心虛如握卵拳指塞掌便能絶其力勢拳須虛則運用便易轉側圎順把腕來平平挺起凡下筆點畫波撇屈曲須皆盡一身之力而送之古人貴懸腕者以可盡力耳大小字皆用此法若以掌貼桌上則指便黏著于紙終無氣力輕重便當失凖蓋腕能挺起則覺其豎豎則鋒必正鋒正則四面勢全也執之雖豎又不可令其太緊使我轉運不得自由大凡執緊必滯今既居大指節前微緊而側向於前矣又須執之使寬急得宜不可一味緊執蓋執之愈緊則愈滯于用故耳大要執之雖緊運之須活不可以指運筆當以腕運筆故執之在手手不主運運之在腕腕不主執執雖期於重穩用必在於輕便然而輕則須沉便則須澀其道以藏鋒為主若不澀則險徑之氣無由而生至于太輕不沉則成浮滑浮滑則俗明徐渭論執管法方按此實本之唐韓明授筆要訣執筆之法謂之執使者執謂執筆使謂運用故孫過庭有執使轉用之法薑堯章云執謂淺深長短使謂縱橫牽掣轉謂鈎環盤紆用謂點畫向背明張紳論執筆法夫書肇於自然自然既立隂陽生焉隂陽既生形勢出矣藏頭護尾力在字中下筆用力肌膚之麗故曰勢來不可止勢去不可遏惟筆軟則竒怪生焉凡落筆結字上皆覆下下以承上使其形勢遞相映帶無使勢背轉筆宜左右回顧無使節目孤露藏鋒點畫出入之迹欲左先右至回左亦爾藏頭圓筆屬紙令筆心常在點畫中行護尾畫點勢盡用力收之疾勢出於啄􅀈之中又在豎筆緊躍之內掠筆在於趲鋒峻躍用之澀勢在於緊駃戰行之法橫鱗豎勒之規蔡雍九勢若書弱紙用強筆若書強紙用弱筆強弱不等則蹉跌不入凡書貴乎沉靜令意在筆前字居心後未作之始結思成矣仍下筆不欲急故須遲何也筆是將軍故須遲重心欲急不宜遲何也心是箭鋒箭不欲遲遲則中物不入每書欲十遲五急十曲五直十藏五出十起五伏方可謂書若直筆急牽褁此暫視似書久味無力仍須用筆著墨不過三分不得深浸毫弱無力墨用松節同研久久不動彌佳矣王羲之筆論先識此字書則得之素與相忌必難描摹臨書最有功以其可得精神也字形在紙筆法在手筆意在心筆筆生意分間布白小心布置大膽落筆翰林粹言捉筆在手便須運意不可妄落一筆一筆才落便想第二筆合作如何下同上欲作署書先想一字體裁得所然後拈筆落中筆時即作全體想落左筆意在右落右筆意在左上下同之明趙宦光論書法成之後字體各有管束一字管兩字兩字管三字如此管一行一行管兩行兩行管三行如此管一紙凡此皆學書者所當知也唐張敬元論書初學先大書不得從小善筆力者多骨不善筆力者多肉多骨微肉者謂之筋書多肉微骨者謂之墨豬多力豐筋者聖無力無筋者病衛夫人筆陳圖用筆當如印印泥如錐畫沙使其藏鋒書乃沉著當其用鋒常欲透過紙背唐褚遂良論書書必有神氣骨肉血五者闕一不為成書也宋蘇軾論書字要骨格肉須裹筋筋須藏肉秀潤乃生布置穩不俗險不怪老不枯潤不肥變態貴形不貴苦苦生怒怒生怪貴形不貴作作入畫畫入俗皆字病也宋米芾論書學書有二一曰筆法二曰字形筆法弗精雖善猶惡字形弗妙雖熟猶生學者能解此始可以語書也已趙孟俯論書心能轉腕手能轉筆書字便如人意古人工書無他異但能用筆耳宋黃庭堅論書張長史謂大字促令小小字展令大董內直論大字貴結密不結密則嫩散而無精神偏旁宜字字相照應一字之美皆偏旁湊成分拆看時各自成一美始為大字之盡善者矣小字貴開濶字內間架宜明整開濶一如大字體段諸美皆具也明王賓敘字凡書要拙多於巧近世少年作字如新婦粧梳百種點綴終無烈婦態也黃庭堅論書學書須要胸中有道義又廣之以聖哲之學書乃可貴若其靈府無程政使筆墨不減元常逸少只是俗人耳余嘗言士大夫處世可以百為惟不可俗俗便不可醫也同上字畫小技耳然而不精研則心與法不相入何由通微不積習則手與心不相應何由造妙師法須髙骨力須重巳識其源雖師心而暗合強摹其迹雖肖貌而實乖明婁堅論字畫一時而書有乖有合合則流媚乖則凋踈略言其由各有其五神怡務間一合也感惠徇知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也紙墨不稱四乖也情怠手闌五乖也乖合之際優劣互差得時不如得器得器不如得志若五乖同萃思遏手蒙五合交臻神融筆暢唐孫過庭書譜作分𨽻書法後漢蔡琰述石室神授筆勢臣父造八分時神授筆法曰書有二法一曰疾二曰澀得疾澀二法書妙盡矣晉衛夫人筆陳圖凶險可畏如八分晉王羲之題筆陳圖後八分更有一波謂之隼尾波即鍾公泰山銘及魏文帝受禪碑中已有此體夫書先須引八分章草入𨽻字即全真書中發人意氣若直取俗字則不能先發豫少學衛夫人將謂大能及渡江北遊名山見李斯曺喜等書又之許下見鍾繇梁鵠書又之洛下見蔡雍石經三體書又於從兄洽處見張昶華嶽碑始知學衛夫人書徒費年月耳遂改本師仍於衆碑學習焉唐張懷瓘六體書論八分者點畫發動體骨雄異作威投戟騰氣揚波貴逸尚竒探靈索妙可謂蔡雍為祖張昶皇象為子鍾繇索靖為孫張懷瓘評書藥石論含識之物皆欲骨肉相稱神貌灑然若筋骨不任其脂肉在馬為駑胎在人為肉疾在書為墨豬推其病狀未即已也非醫不能為之惟題署及八分則肥密可也元吾衍三十五舉𨽻書人謂宜匾殊不知妙在不匾挑拔平硬如折刀頭方是漢𨽻書體括云方徑古拙斬釘截鐡備矣𨽻法頗深具其大略元劉有定論書篆直分側直筆圓側筆方用法有異而執筆初無異也其所以異者不過遣筆用鋒之差變耳蓋用筆直下則鋒常在中欲側筆則微倒其鋒而書體自然方矣古人學書皆用直筆王次仲等造八分始側法也眀豐道生學書法學書須先楷法作字必先大字八嵗即學大字以顔為法十餘嵗乃習中楷以歐為法中楷既熟然後斂為小楷以鍾王為法楷書既成乃縱為行書行書既成乃縱為草書學草書者先習章草知偏旁來歷然後變化為草聖凡行草必先小而後大欲其專法二王不可遽放也學篆者亦必由楷書正鋒既熟則易為力學八分者先學篆篆既熟方學八分乃有古意童子至草四草五嵗當學八分其法先大而後小當法唐明皇泰山碑銘書本不古可法初學故録之北海相景君碑洪都石經堂邑令費鳯碑隂論分𨽻唐張懷瓘十體書斷八分者秦羽人上谷王次仲所作也贊曰仙客遺範靈姿秀出奮斫揚波金相玉質龍騰虎踞兮勢非一交戟橫戈兮氣雄逸楷之為妙兮備華實宋范成大論書漢人作𨽻雖不為工拙然皆有筆勢腕力其法嚴於後世真行之書精彩意度粲然可以想見筆墨畦徑也元郝經論書漢之𨽻法蔡中郎不可得而見矣存者惟魏太傅繇繇沉鷙威重人也故其書徑利方重如畫劔纍鼎斬絶深險又變而為楷後世亦不可及宋黃伯思論書篆法之壞肇李監草法之弊肇張長史八分之俗肇韓擇木此諸人書非不工也而闕古人之淵源教俗士之升木於書家為患最深夫篆之方穩草之顛放八分之纎麗學便可至而天一作大勢失矣彼觀鐘彞文識漢世之碑王索遺迹寧不少損乎此可為知者道論𨽻分楷所繇起許慎説文序云秦書八體大篆小篆刻符蟲書摹印署書殳書𨽻書漢書藝文志云漢書六體古文竒字篆書𨽻書繆書蟲書後漢儒林傳云古文篆𨽻三體是漢以前並無楷與八分之名也晉衛恆四體書勢乃云𨽻書者篆之捷上谷王次仲始作楷法楷法始見於此是即指𨽻為楷後魏江式書表云蔡雍採李斯曹喜之法為古今雜形詔於太學立石碑刋載五經題書楷法多是雍書又不别云作𨽻而後世所傳蔡雍石經俱是𨽻字非即指𨽻為楷乎八分則始見於蔡文姬石室書勢唐元度唐人十體書論亦云王次仲始作八分楷法謂有楷法也是又指八分為楷蓋楷者法也式也模也禮儒行云今世行之後世以為楷次仲分𨽻可以為後世楷式故或以名𨽻或以名分非如今世别有楷一種也至後則直以楷名𨽻然𨽻之與今楷書實屬同原余嘗謂李斯小篆如所傳嶧山碑整齊莊重筆畫調勻與今楷固自迥絶程邈減省為𨽻圖為便捷約略如今楷書而無波偃挑剔等勢吾衍謂若漢欵識字是也觀淳化法帖中載邈數十字雖出王著臨摹然太宗雅志摉羅所傳邈書必係歷代內府留貽非著以意為之者自古推邈為𨽻書之祖並不言其作楷而止存此數十字足見楷與𨽻原無分别也至漢始有波偃挑剔今所傳石刻班班可見然如北海景君衡方魯峻張遷武榮等碑微作挑法而方板遲重猶存古意韓勑孔宙孔彪孔褒曺全等則姿媚橫逸巨細長短惟意所適直開今楷書法門矣流傳既久漸失其本自魏及晉鍾王以降專務姿媚以恱人妍巧萬狀見者無不愛于是楷法興而所謂古𨽻者乃若自成一體矣間有作碑刻者猶循其舊作𨽻而時無真書楷書之名仍總名之曰𨽻而已衛恆云始作楷法原指𨽻言趙明誠云東魏大覺寺碑韓毅自題為𨽻書蓋今楷書也至唐則直以𨽻為楷而别以八分為𨽻貞觀元年詔五品以上子弟𨽻館習書出唐書百官志唐五體書古文大篆小篆八分𨽻書出唐六典張懷瓘十體書斷古文大篆籀文小篆八分𨽻書懷瓘六體書論云𨽻書者字皆真正曰真書行書章草飛白草書唐元度十體書古文大篆八分小篆飛白倒薤散𨽻懸針鳥書垂露俱分八分與𨽻為二是皆以𨽻為楷而以八分為古𨽻也懷瓘又云八分小篆之捷𨽻亦八分之捷漢陳遵善𨽻書與人尺牘皆以為寶爾後元常逸少各造其極夫許昌二碑相傳為元常書乃是𨽻體餘所傳宣示賀捷力命諸表皆楷書逸少則并無𨽻體一字可見而云各造其極非𨽻即楷之明驗乎宋周越鄭昻八體俱同懷瓘而去籀文章草范度則約以篆八分真行草五體而云其體雖五其流惟三篆則統科斗玉筯垂露薤葉大小之屬𨽻則統乎羲獻鍾庾歐虞顔柳真草之輩八分則酌乎篆𨽻之間是宋亦以𨽻名楷也觀夢英篆千文袁正巳以楷注其下而自題為𨽻書可證已要而論之唐以前𨽻楷合為一唐以後𨽻即今楷書與八分即古𨽻書分為二宋亦因之故趙眀誠有歐陽公誤以八分為𨽻之譏也余謂凡後漢魏晉間碑不妨仍其名為𨽻而唐以後之碑斷宜名為八分而不得仍名為𨽻近顧寧人金石文字記并漢碑無不名為八分而以楷為正書以别之正恐仍蹈歐陽公之失耳論漢唐分𨽻同異八分之説不一割𨽻八分取二分割篆二分取八分此世傳蔡琰之語也然不見琰本傳及他記載恐不足據王愔云王次仲始以古文方廣少波勢以𨽻字作楷法字方八分言有楷模張懷瓘駁之曰若驗方廣則篆籀有之變古為方不知其謂郭忠恕云書有八體蔡雍以𨽻作八分體蓋八體之後又生此法謂之八分更屬牽強張懷瓘云楷𨽻初制大範幾同蓋其嵗深漸若八字分散又名八分而忠恕亦有皆似八字勢有偃波之説余謂此為近是至八分二字秦漢言書法者俱未之及亦惟世傳蔡琰述石室神授筆勢有云臣父造八分時神授筆法八分始見於此繼此晉成公綏武帝泰始時人𨽻書體云八分璽法殊好異制劉劭成帝咸康時人飛白書勢云鳥魚龍蛇龜獸仙人蛟腳偃波楷𨽻八分而衛夫人筆陳圖則云凶險可畏如八分王逸少題筆陳圖後亦云八分更有一波謂之隼尾波又云先須引八分章草入𨽻字此即指楷中發人意思又云或如散𨽻或近八分或橫畫似八分而發如篆籀自後言八分者紛紛而卒未有以𨽻碑為八分者蓋其時𨽻初變而為楷未曽以楷書别之故總名之為𨽻至唐則歐虞褚薛書特盛於是名楷書為𨽻書古𨽻為八分且以八分為五體之一而𨽻與八分截然分而為二矣於是目漢碑者則仍曰漢𨽻目唐碑者則仍曰八分又似漢唐邈不相襲矣其實漢𨽻即唐八分唐八分即漢𨽻初無二也今觀唐所傳明皇泰山孝經與梁升卿史惟則蔡有鄰韓擇木諸石刻何嘗去漢碑徑庭乎特漢多拙朴唐則日趨光潤漢多錯雜唐則專取整齊漢多簡便如真書唐則偏增筆畫為變體神情氣韻之間迥不相同耳至其面貌體格固優孟衣冠也乃後人妄生議論必欲分而為二宣和書譜謂唐變方廣作波勢夫唐何嘗不方廣漢何嘗無波勢耶郭忠恕謂蔡雍以𨽻作八分體是以𨽻在八分先矣乃又云小篆散而八分生八分破而𨽻書出是又以𨽻在八分後豈不自相矛盾乎洪適則謂東漢時分𨽻已兼有之今漢碑具在試問何碑為𨽻何碑為分適將何從措詞也吾衍字源七辨則分秦𨽻八分漢𨽻為三且云秦𨽻八分乃未有挑法之𨽻夫秦𨽻無可見何從而知且既云皆未有挑法何從别其為秦𨽻為八分至以石經及漢人諸碑為漢𨽻是己又云與秦𨽻同名其實則異又謂之八分支離遷就毫無定見矣陶宗儀謂建初中以𨽻為楷本一書而二名鍾王變體楷𨽻始别是已乃譏隋唐以降古法盡廢指八分為𨽻者之非夫指八分為𨽻猶從其本言之耳何可非乎歐陽公集古録只漢碑皆目為漢𨽻又云漢有𨽻分唐有分楷不知何所見而逞此臆説也漢魏碑考前代金石遺文每足補史家之闕昔人歐陽公趙明誠洪景伯楊用修都元敬趙子函王元美辨之詳矣未有論及書法者余頗嗜分𨽻以少所涉歷摉羅狹陋祗就時時觀覽者稍為評隲示之同好或有取焉其但經目覩而不為我有概不及云漢北海相景君碑并隂順帝漢安二年八月碑今在濟寧州儒學余所存漢碑始於此額題篆漢故益州太守北海相景君銘十二字分二行文十七行行三十二字中有孔在第八字下孔處三行各廢兩字第一明府及亂曰俱另起字體頗長豎筆微近今栁葉篆不盡作鈎躍𨽻釋本文闕二十七字余本又闕三十二字然頗有丈義可讀趙子函謂殘闕不成文何耶獨額曰銘辭曰誄弇州譏其未妥良是碑隂凡三列第三列姓名下又云行三年服者凡八十七人末兩行四言詞十八句敘立碑意字視碑丈差小更遒徑有致碑文梟字即鴟字觀下文低佪低字作􅀢可見𨽻釋作梟非又孝子憉􅀈􅀈字字書無宜參鼎􅀈􅀈字𨽻釋謂借作拂取輔拂弼義字書亦無俱應補入漢碑多有孔文字記論之甚詳不復贅漢置孔廟卒史孔和碑桓帝永興元年六月碑今在孔廟無額文十八行行四十字第八行制曰髙出一字下空數字書司徒公河南十二字第九行雒陽宮下空數字書司空公蜀郡十二字文俱與上不屬劉太乙云因有空故勒於此是也楊用修都元敬録全文而俱遺此豈未見拓本耶考史元嘉三年五月改元永興文兩書元嘉三年三月一書永興元年六月實一年事也字特雄偉如冠裳佩玉令人起敬近鄭簠每喜臨之漢韓勑造孔廟禮器碑并隂桓帝永壽二年碑今在孔廟無額文十三行行三十六字第八行皇字高出一字𨽻辨作第三行誤末記韓君名字下接率錢姓氏八人文有云復顔氏并官氏邑中繇發以尊孔心繇與徭同繇發連讀𨽻辨以發屬下句亦非字躍處極豐而筆畫頗細與卒史迥殊子函謂其無二宜太乙之譏之也𨽻釋云碑隂一六十有二人今俱全漢郎中鄭固碑桓帝延熹元年碑今在濟寧州儒學額題篆漢故郎中鄭君之碑八字分二行中有孔文十五行行二十九字碑已中斷今所存上截十九字闕下截十字太乙謂上截十八字誤筆法堅徑遒緊惜剝蝕已甚此碑諸家不見有隂太乙誤以北海景君碑移之於此惜不及致書令弟嘯雲一正之也漢泰山都尉孔宙碑桓帝延熹七年碑今在孔廟額題篆有漢泰山都尉孔君之碑十字文十四行行二十八字首行題云有漢泰山都尉孔君之銘𨽻釋云凡漢碑有額者首行即入詞無額者或題其前已篆其上復標其端惟此碑爾字較諸碑特巨規矩整齊一筆不苟而姿態却自橫溢有卒史之雄健而去其板重化韓敕之方幅而有其清真實超前絶後第一手也厥後曹全孔靇俱從此脫胎耳碑隂全無之漢衛尉卿衡方碑靈帝建寧元年九月碑今在汶上縣額題八分漢故衛尉卿衡府君之碑十字分二行字凸起額下有孔文二十三行行三十六字字巨如孔宙而筆畫粗硬轉掉重濁則石理太粗刻手不工之故耳細玩之其遒徑靈秀之致固在也至修階貢名等字豎皆連上他碑所無𤻱鴈㿌癀俱從疒亦無謂漢執金吾丞武榮碑碑今在濟寧州儒學額題八分漢故執金吾丞武君之碑十字分二行凸起字極秀逸可愛文十行行三十一字漶漫殊甚𨽻釋已闕十九字今本又闕八十字故文義多不可讀字亦拘迫不甚工遜額逺甚文不載年月中有云遭孝桓憂悲􅚸疾隕當在建寧之初故列于此漢史晨饗孔廟前後兩碑靈帝建寧二年碑今俱在孔廟無額前碑文十七行行三十六字兩尚書及朝廷並别起時副言云云在尚書下隔三字昔在仲尼又别起後碑十四行行三十五字時長史及史君饗後史君念孔瀆又敕瀆井假夫子冡五處皆别起自史君饗後至末字較前差巨蓋補垣通溝立市種梓置守吏乃次第舉行非一時事故前後不同然皆一人手也兩碑字修飭緊密矩度森然如程不識之師步伍整齊凜不可犯其品格當在卒史韓勑之右漢淳于長夏承碑靈帝建寧三年此碑據都元敬所得雙鈎舊本已闕四十五字則真本不傳久矣余所收文字頗全勤約作勤紹其為重刻無疑但不知即元敬所疑後人偽作者耶抑并非此本而為嘉靖時重刻漳川書院者耶文十三行行三十字每字周圍約寸七八分雖傳刻失真然氣體雄偉不落佻巧家數其轉灣處作住筆另起如也先已之類實創見也漢博陵太守孔彪碑靈帝建寧四年碑今在曲阜縣額題篆漢故博陵太守孔府君碑十字分二行文十八行行四十五字格式稀踈字特小秀潤清逸楚楚可愛且純以楷法運用微作波磔所謂劔拔弩張者一切無之矣余閲孔宙及宙子褒并此三碑俱精妙殊絶意當時崇重闕里子姓非能手不輕下筆即竹垞亦謂絶類曹全筆法信然彪名字今尚可見歐公先今六百餘年乃云磨滅不可得或後人因糢糊太甚略加修治耳漢李翕析里橋郙閣頌靈帝建寧五年碑今在漢中略陽縣據𨽻釋云李君治武都橋道前後三處磨崖此析里橋郙閣頌𨽻額别有數行刻書撰人及石師姓名余所存無額及後數行止存文十九行行二十七字太守及頌與詩别起自第九行上截衡官椽衡字斜缺至末或二三四五六字不等洪本原闕四十二字今更闕一十字矣字樣倣佛夏承而險怪特甚相其下筆粗鈍酷似村學堂五六嵗小兒描硃所作而仔細把玩一種古朴不求討好之致自在行間蓋磨崖則書刻俱倍難於上石耳丙戌官都門從孫樹峯前輩借觀乃宛平北海孫氏藏本同年劉太乙以為不足法余謂茅茨土階固不若雕墻峻宇之奪目久矣漢司𨽻校尉魯峻碑靈帝熹平二年碑今在濟寧州儒學額題八分漢故司𨽻校尉忠惠父魯君碑十二字額下有孔文十七行行三十二字字體方整勻淨凡勒筆磔筆躍筆挑起處極豐肥開元諸家似效其體漢聞喜長韓仁碑靈帝熹平四年碑今在滎陽縣額題篆漢循吏故聞喜長韓仁銘十字太乙云碑止載當時下書豎石原文不贅一詞甚為古雅以世知之者少故備録之但以余本相較更多數字豈太乙偶未細檢邪字體肥重絶類魯峻但微匾耳漢豫州從事尹宙碑靈帝熹平六年碑今在鄢陵縣碑首有孔居中其右橫篆從銘二字文十四行行二十七字太乙云以近出故完好方整渾穆信漢碑之尤者余按額從銘二字無解文中有州辟從事語意二字上尚有二字或四字敘其官位今斷蝕耳且從銘字與孔平上止餘寸許不應寸許下便鑿如許孔也漢白石神君碑靈帝光和二年碑今在元氏縣額題篆白石神君碑五字凸起文十四行行三十五字𨽻釋以其字不類漢人疑為重刻但碑末有燕元璽三年題名元璽去光和百七十餘年中間未必重刻若元璽以後人又必不肯并題名字摹之也余統閲前後諸碑如此類頗多不必苛求耳碑末列石師王明與郙閣頌同即後世載刋石姓氏例也何太乙云不曉石師所謂耶漢郃陽令曹全碑并隂靈帝中平二年碑今在郃陽縣萬􅍓中掘地得之無額文十九行行四十五字書法秀美飛動不束縳不馳驟洵神品也且出土不久用筆起止鋒鋩纎毫畢露虛心諦觀漸漬久之一切癡肥方板之病自可盡去矣何患字學之不日進哉文敘次詳贍清朗可誦較諸碑亦為傑出太乙以夷齊史魚等語不倫譏之過矣碑隂字差小亦可愛每一翻閲實不厭字眼之重復也惜此本末一行為裝潢家失去竹垞康熙庚戌跋此碑美其完好謂漢碑之存於今者莫或過焉後二年從京師購之碑已中斷完好者且漶漫矣今又去竹垞時甲子一周宜漶漫之日甚也漢蕩隂令張遷碑并隂靈帝中平三年碑今在東平州儒學額題篆漢故榖城長蕩隂令張君表頌十二字分二行文十三行行四十二字碑亦出近代故歐趙洪俱不載余玩其字頗佳惜摹手不工全無筆法隂尤不堪亭林以賓傍加歹為無理南原據鄭康成曽子問注駁之不知奠而後辭于殯原不必改作賓先儒多言之者不足以折亭林也暨分既且更屬難解宜亭林疑為好事者模刻遂訛謬至此至并訾其書法不佳愚不謂然南原𨽻辨未見碑隂余本有之凡三列第一列十九人第二列同第三列三人共四十一人末行正書付禮二字不解漢孔褒碑碑今在孔廟額題八分漢故口缺一字州從事孔君之碑十字殘闕特甚約草行每行約三十字其中有字者草四行餘四五行無一字首云君諱褒字文禮孔子草世之孫泰山都尉之元子及繼德前葉清和純懿二十餘字尚可讀後俱不能成文矣今拾其筆畫稍清者五十餘字存之無年月可考此碑不特歐趙洪諸家所無近日亭林南原摉羅頗廣而俱未之及余得之行笥中并不知何自來也雖糢糊已甚然實僅有之物可不寶諸魏公卿上尊號碑獻帝延康元年碑今在許州額題篆魏公卿將軍上尊號奏九字碑式云文二十二行行四十九字先王及髙陵兩武王三陛下皆平闕自陛下即位後十行刻於碑隂兩陛下亦平闕𨽻釋謂自造于華裔之後石理皴剝字迹暗昧今世所傳多是前一假爾合之碑式所云知以刻于碑隂故前後明滅不同也余所存即前假較𨽻釋原文已闕三分之一後假更不可得矣魏受禪碑文帝黃初元年碑亦在許州額題篆魏受禪表四字文二十二行行四十八字先皇及陛下五皇帝皆平闕余本較𨽻釋原文約闕八十字魏封孔羡碑文帝黃初元年碑今在孔廟額題篆魯孔子廟之碑六字文二十三行行四十二字制詔皇上聖皇及煌煌大魏皆别起曹丕四碑大饗余未之見𨽻釋謂繁昌兩碑自是一家良是乃獨盛誇此碑而以為四碑之冠未必然也魏勸進受禪兩碑匪特大小體式毫髮不爽而氣味蒼古絶無低昻自出一手無疑特受禪筆鋒差瘦耳右軍云之許下觀梁鵠鍾繇書顔平原以受禪為鍾今雖未能定為誰氏要知非鍾梁不能矣孔羡碑畫肥重而豎作意鈎處尤無收拾如乃可哉等字殊不耐看直開史惟則粗俗一派與前二碑迥别即果如後題陳思王詞梁鵠書亦鵠書最下者太乙乃云勸進蒼徑而受禪方整與孔羡碑酷肖其為兩人無疑吾不知何所見也從來論八分者俱分漢唐余以為八分自漢止矣孔褒曹全乃東漢末年全碑秀潤挺拔固自獨步且出自近年鋒煆俱存尤為可愛褒碑已極糢糊余祗存其百十字而秀逸之至實不減曹其時去黃初不過二十餘年今黃初三碑具在氣味體格判若兩途究而論之固不獨孔羡碑也即勸進受禪亦何嘗非唐人先聲乎此固其時與運為之也否則宜官繇鵠輩林立一時追蹤往哲詎遂不能耶故愚謂魏適以開唐斷不可以繼漢洪景伯之𨽻釋婁彥發之字源雖末收魏晉一二家而止以漢石非無見也分𨽻偶存卷上
