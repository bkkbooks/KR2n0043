front:
  text: 跋九沙先生承都督公名儒之後世以理學經學顯而先生尤邃於經所輯辨志堂書薄海內家家有之書學非其甚屑意者若𨽻書又書學中一節耳而世人特寶貴之求書者往往趾踵相接絹素堆積几案閲數十年以為常既從事久凡目之所及心之所得舉而筆之雖未嘗有意勒成一書而沾丐學者亦已多多矣曽屬余是正未幾家燼於火與先代所傳及他著一時俱盡是編其門徒程君雪汀所存别本也訛字頗多將鏤版舉以似余余不克訂書數語歸之乾隆甲子仲秋望日錢塘梁文浤拜手書
  hash: sha256:035559c8c2be6887b13c1aa4ea1f7ce77af73dedec1388d80ba5292fbd3c1bcd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0043_WYG_003-1a, image: WYG0684/WYG0684-0502a.png}
body:
  text: 先太史紀年有云豫素嗜字學尤篤於分𨽻春和手柔取古來論𨽻學及作𨽻人姓氏彚為一編附以臆説及漢唐碑刻題識語數十則名九沙分𨽻偶存亦夙習未忘也福幼侍先太史嘗聞訓季姊及寄伯兄書自敘年十三時見友人案頭曹全碑一册假歸仿之及少長遊學入仕以迄歸田遍求古今名迹臨摹規畫實有愜心以故興酣落筆揮灑自如是編成於雍正辛亥之春年七十有三矣閲十載庚申家罹祝融之危所藏漢唐碑帖洎生平著述殆盡後於及門程君清標處得是編存藁不無魯魚痛先太史旋歸道山未克訂正福珍之篋笥有年頃來山左姪綿前章邱署中訪知邑人焦君迪曽嗜古善書丏其校訂綿前亟謀夀梓以公海內福因備述顛末記之綿前為伯兄承天次子伯兄字石梁號訥庵雍正己酉拔貢前陽榖令卒於官能嗣先太史臨池之學季姊承保字季齋亦能以漢𨽻法作擘窠大字歸長沙進士周宣猷早沒福謹附書於後以俟當世博雅君子採輯焉時乾隆己丑九月朔男福百拜敬識
  hash: sha256:2716282e4bdd1c93e3d3aa5c78fb7a4c8020680e941f1a5d99c5a0b2fe7210be
